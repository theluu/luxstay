            - text: "Kích thước lớn: Mụn phát triển sâu dưới bề mặt da, thường sưng to và có cảm giác cứng khi chạm vào."
            - generic:
              - paragraph
          - listitem [level=1] [ref=e71]:
            - text: "Sưng đỏ, đau nhức: Vùng da xung quanh mụn có phản ứng viêm rõ rệt, gây đau và khó chịu."
            - generic:
              - paragraph
          - listitem [level=1] [ref=e72]:
            - text: "Có nhân mủ: Bên trong mụn chứa dịch mủ màu trắng hoặc vàng, đôi khi khó nhìn thấy bằng mắt thường."
            - generic:
