            - generic:
              - paragraph
        - paragraph [ref=e74]: Việc hiểu rõ mụn bọc là gì và các dấu hiệu đặc trưng sẽ giúp bạn chủ động hơn trong chăm sóc da, hạn chế biến chứng và bảo vệ làn da khỏe mạnh lâu dài.
        - heading "2. Nguyên nhân chính gây mụn bọc" [level=2] [ref=e75]
        - paragraph [ref=e76]: Mụn bọc hình thành do sự kết hợp của nhiều yếu tố bên trong và bên ngoài cơ thể. Khi các yếu tố này tác động đồng thời, tình trạng viêm nhiễm dưới da trở nên nghiêm trọng hơn, khiến mụn dễ sưng to và đau nhức.
        - figure "Nguyên nhân chính gây mụn bọc" [ref=e77]:
