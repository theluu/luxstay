        - heading "3. Cách xử lý và điều trị mụn bọc" [level=2] [ref=e89]
        - paragraph [ref=e90]: Mụn bọc là dạng mụn viêm nặng, vì vậy việc xử lý cần đúng cách và kiên nhẫn để hạn chế viêm nhiễm lan rộng cũng như nguy cơ để lại sẹo. Tùy theo mức độ mụn, bạn có thể áp dụng các biện pháp chăm sóc tại nhà hoặc can thiệp y tế khi cần thiết.
