          - listitem [level=1] [ref=e86]:
            - text: "Chế độ sinh hoạt chưa hợp lý: Thói quen ăn nhiều đồ cay nóng, dầu mỡ, thường xuyên thức khuya hoặc stress khiến da dễ bùng phát mụn."
            - generic:
