        - paragraph [ref=e119]: "Các biện pháp phòng ngừa mụn bọc hiệu quả gồm:"
        - list [ref=e120]:
          - listitem [level=1] [ref=e121]:
            - text: "Duy trì vệ sinh da sạch sẽ: Làm sạch da đều đặn bằng sản phẩm dịu nhẹ giúp loại bỏ dầu thừa, bụi bẩn và vi khuẩn – những yếu tố dễ gây bít tắc lỗ chân lông."
            - generic:
              - paragraph
          - listitem [level=1] [ref=e122]:
            - text: "Ăn uống lành mạnh: Ưu tiên thực phẩm giàu vitamin, rau xanh và trái cây; hạn chế đồ cay nóng, dầu mỡ để giảm nguy cơ kích thích viêm mụn."
            - generic:
              - paragraph
          - listitem [level=1] [ref=e123]:
            - text: "Giữ tinh thần thoải mái, ngủ đủ giấc: Tránh căng thẳng kéo dài và đảm bảo ngủ đủ mỗi ngày giúp cân bằng nội tiết, từ đó hỗ trợ làn da phục hồi và khỏe mạnh hơn."
            - generic:
              - paragraph
        - paragraph [ref=e124]: Thực hiện đều đặn các biện pháp trên sẽ giúp bạn chủ động phòng ngừa mụn bọc và duy trì làn da sạch mụn, tươi sáng theo thời gian.
        - heading "5. Một số câu hỏi thường gặp về mụn bọc" [level=2] [ref=e125]
        - heading "5.1. Mụn bọc có nên nặn không?" [level=4] [ref=e126]
        - figure "Một số câu hỏi thường gặp về mụn bọc" [ref=e127]:
          - generic [ref=e130]: Một số câu hỏi thường gặp về mụn bọc
        - paragraph [ref=e131]: Không nên tự ý nặn mụn bọc tại nhà. Mụn bọc nằm sâu dưới da, có ổ viêm lớn nên việc nặn sai cách dễ làm vỡ ổ viêm, khiến vi khuẩn lan rộng, tình trạng mụn nặng hơn và tăng nguy cơ để lại thâm, sẹo lõm. Nếu cần xử lý, bạn nên đến cơ sở da liễu uy tín để được bác sĩ can thiệp an toàn.
        - heading "5.2. Mụn bọc bao lâu thì khỏi?" [level=4] [ref=e132]
        - paragraph [ref=e133]: Thời gian mụn bọc khỏi nhanh hay chậm phụ thuộc vào mức độ viêm và cách điều trị. Thông thường, nếu được chăm sóc và điều trị đúng cách, mụn bọc có thể giảm sưng và xẹp dần sau 7–14 ngày. Trường hợp mụn nặng hoặc tái phát nhiều có thể kéo dài lâu hơn và cần theo dõi bởi bác sĩ da liễu.
        - heading "5.3. Mụn bọc có để lại sẹo không?" [level=4] [ref=e134]
        - paragraph [ref=e135]: Mụn bọc có nguy cơ để lại sẹo nếu viêm nặng, kéo dài hoặc bị nặn sai cách. Tuy nhiên, nếu được điều trị sớm, đúng phương pháp và chăm sóc da cẩn thận sau mụn, nguy cơ sẹo và thâm có thể được hạn chế đáng kể.
        - paragraph [ref=e136]: Mụn bọc tuy là tình trạng da liễu phổ biến nhưng hoàn toàn có thể kiểm soát và cải thiện nếu được xác định đúng nguyên nhân và điều trị theo phác đồ phù hợp. Việc kết hợp chăm sóc da đúng cách, điều chỉnh lối sống khoa học và can thiệp chuyên môn khi cần thiết sẽ giúp hạn chế viêm nhiễm, ngăn ngừa sẹo và duy trì làn da khỏe mạnh lâu dài.
