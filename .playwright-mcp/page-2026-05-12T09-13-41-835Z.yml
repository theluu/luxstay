        - list [ref=e82]:
          - listitem [level=1] [ref=e83]:
            - text: "Lỗ chân lông bị bít tắc: Dầu thừa, bụi bẩn, tế bào chết tích tụ lâu ngày hoặc cặn trang điểm chưa được làm sạch kỹ là điều kiện thuận lợi khiến lỗ chân lông bị tắc nghẽn."
